# Minimal tmux config for Antigravity CLI addon
# Hide status bar (we have our own UI chrome)
set -g status off

# Enable truecolor
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Don't delay ESC key (important for CLI responsiveness)
set -sg escape-time 0

# Disable mouse to allow native mobile touch scrolling
set -g mouse off

# Disable alternate screen for native scrollback
set-option -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# Allow PageUp to automatically enter copy-mode
bind -n PageUp copy-mode -u
